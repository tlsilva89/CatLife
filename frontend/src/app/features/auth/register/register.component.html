<div class="min-h-screen bg-cat-bg flex items-center justify-center p-4 relative overflow-hidden">

  <div
    class="absolute inset-0 z-0 opacity-10 pointer-events-none bg-[url('/bg-hero.png')] bg-cover bg-center mix-blend-multiply">
  </div>

  <div class="card w-full max-w-md p-8 relative z-10 shadow-xl bg-white/95 backdrop-blur-sm">
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-cat-secondary/10 text-cat-secondary mb-4">
        <i class="i-ph-user-plus text-4xl"></i>
      </div>
      <h1 class="font-heading font-bold text-3xl text-cat-text m-0 mb-2">Crie sua conta</h1>
      <p class="text-cat-textLight text-sm m-0">Junte-se ao CatLife e organize a rotina do seu pet.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="name" class="text-sm font-bold text-cat-text">Nome</label>
        <div class="relative">
          <i class="i-ph-user text-xl text-cat-textLight absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input id="name" type="text" formControlName="name" class="input-field pl-10 bg-white"
            placeholder="Como devemos te chamar?">
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-bold text-cat-text">E-mail</label>
        <div class="relative">
          <i class="i-ph-envelope text-xl text-cat-textLight absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input id="email" type="email" formControlName="email" class="input-field pl-10 bg-white"
            placeholder="seu@email.com">
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-bold text-cat-text">Senha</label>
        <div class="relative">
          <i class="i-ph-lock-key text-xl text-cat-textLight absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input id="password" type="password" formControlName="password" class="input-field pl-10 bg-white"
            placeholder="No mínimo 6 caracteres">
        </div>
      </div>

      <button type="submit" [disabled]="registerForm.invalid"
        class="btn-secondary w-full mt-4 py-3 text-lg disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
        Cadastrar
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-cat-textLight">
      Já possui uma conta?
      <a routerLink="/login" class="font-bold text-cat-secondary hover:underline">Faça login</a>
    </div>
  </div>
</div>
