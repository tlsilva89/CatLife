<div class="min-h-screen bg-cat-bg flex items-center justify-center p-4 relative overflow-hidden">

  <div
    class="absolute inset-0 z-0 opacity-10 pointer-events-none bg-[url('/bg-hero.png')] bg-cover bg-center mix-blend-multiply">
  </div>

  <div class="card w-full max-w-md p-8 relative z-10 shadow-xl bg-white/95 backdrop-blur-sm">
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-cat-primary/10 text-cat-primary mb-4">
        <i class="i-ph-paw-print-fill text-4xl"></i>
      </div>
      <h1 class="font-heading font-bold text-3xl text-cat-text m-0 mb-2">Bem-vindo de volta!</h1>
      <p class="text-cat-textLight text-sm m-0">Acesse sua conta para cuidar do seu gatinho.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-bold text-cat-text">E-mail</label>
        <div class="relative">
          <i class="i-ph-envelope text-xl text-cat-textLight absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input id="email" type="email" formControlName="email" class="input-field pl-10 bg-white"
            placeholder="seu@email.com">
        </div>
      </div>

      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-bold text-cat-text">Senha</label>
        <div class="relative">
          <i class="i-ph-lock-key text-xl text-cat-textLight absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input id="password" type="password" formControlName="password" class="input-field pl-10 bg-white"
            placeholder="••••••••">
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
        class="btn-primary w-full mt-4 py-3 text-lg disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
        Entrar
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-cat-textLight">
      Ainda não tem uma conta?
      <a routerLink="/register" class="font-bold text-cat-primary hover:underline">Cadastre-se</a>
    </div>
  </div>
</div>
